<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover" />
	<title>SG Nearby Bus Stops</title>
	<meta name="description" content="Find nearby Singapore bus stops on an interactive map with location search, radius filtering, and arrival-time links." />
	<meta name="theme-color" content="#4f46e5" />

	<!-- Open Graph / Twitter share cards -->
	<meta property="og:type" content="website" />
	<meta property="og:title" content="SG Nearby Bus Stops" />
	<meta property="og:description" content="Find nearby Singapore bus stops on an interactive map with location search, radius filtering, and arrival-time links." />
	<meta property="og:url" content="https://yapweijun1996.github.io/Nearby-Bus-stop/" />
	<meta property="og:image" content="https://yapweijun1996.github.io/Nearby-Bus-stop/icons/icon-512.png" />
	<meta name="twitter:card" content="summary" />
	<meta name="twitter:title" content="SG Nearby Bus Stops" />
	<meta name="twitter:description" content="Find nearby Singapore bus stops on an interactive map with location search, radius filtering, and arrival-time links." />
	<meta name="twitter:image" content="https://yapweijun1996.github.io/Nearby-Bus-stop/icons/icon-512.png" />
	<meta name="color-scheme" content="light" />
	<meta name="application-name" content="SG Nearby Bus Stops" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="SG Bus Stops" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="msapplication-TileColor" content="#4f46e5" />

	<link rel="manifest" href="./manifest.webmanifest" />
	<link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
	<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
	<link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
	<link rel="mask-icon" href="./icons/icon.svg" color="#4f46e5" />

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<link rel="stylesheet" href="./src/styles/app.css" />
</head>

<body>
	<button id="showBtn" aria-label="Show Controls"></button>

	<div class="controls sheet-half" id="controls">
		<button id="sheetHandle" class="sheet-handle" type="button" aria-label="Expand controls" aria-controls="controls"
				aria-expanded="false"></button>

		<div class="controls-row radius-row">
			<label for="radius" class="radius-label">Radius <span><span id="radiusValue" aria-live="polite">200</span>m</span></label>
			<input type="range" id="radius" min="100" max="2000" value="200" step="50"
				   aria-label="Search radius in meters" aria-describedby="radiusValue" />
		</div>

		<div class="controls-row search-row">
			<div class="search-combobox">
				<input type="text" id="searchInput" placeholder="Search for a location..." aria-label="Search for a location"
					   autocomplete="off" spellcheck="false" role="combobox" aria-autocomplete="list"
					   aria-expanded="false" aria-controls="searchSuggestions" />
				<div id="searchSuggestions" class="combo-list" role="listbox" aria-label="Search suggestions"></div>
			</div>
			<button id="searchBtn" class="btn-primary" aria-label="Search for location">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path
						d="M21 21L16.514 16.506M19 10.5C19 15.194 15.194 19 10.5 19S2 15.194 2 10.5 5.806 2 10.5 2 19 5.806 19 10.5Z"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
				</svg>
				<span>Search</span>
			</button>
		</div>

		<div class="controls-row action-row">
			<button id="locateBtn" class="btn-primary" aria-label="Get current location">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path d="M12 2L13.09 8.26L22 9L13.09 9.74L12 16L10.91 9.74L2 9L10.91 8.26L12 2Z"
						stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
				</svg>
				<span>Locate Me</span>
			</button>
			<button id="searchToggleBtn" class="btn-primary watch-only" aria-label="Search for a location" aria-expanded="false">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path d="M21 21L16.514 16.506M19 10.5C19 15.194 15.194 19 10.5 19S2 15.194 2 10.5 5.806 2 10.5 2 19 5.806 19 10.5Z"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
				</svg>
				<span>Search</span>
			</button>
			<button id="retryBtn" class="btn-primary" aria-label="Retry API requests" style="display: none;">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path d="M4 4V9H4.58152M20 20V15H19.4185M15.9385 9.5L19.4185 6M19.4185 6L16 6M19.4185 6L20 6M8.06152 14.5L4.58152 18M4.58152 18L8 18M4.58152 18L4 18"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
				</svg>
				<span>Retry</span>
			</button>
			<button id="toggleBtn" class="btn-toggle" aria-label="Toggle controls panel visibility" aria-expanded="true">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
						stroke-linejoin="round" />
				</svg>
				<span>Hide</span>
			</button>
			<button id="fullscreenBtn" class="btn-success" aria-label="Toggle fullscreen mode" aria-pressed="false">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<path
						d="M8 3H5C3.89543 3 3 3.89543 3 5V8M21 8V5C21 3.89543 20.1046 3 19 3H16M16 21H19C20.1046 21 21 20.1046 21 19V16M3 16V19C3 20.1046 3.89543 21 5 21H8"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
				</svg>
				<span>Fullscreen</span>
			</button>
		</div>

		<div id="stopList" class="stop-list" role="list" aria-label="Nearby bus stops">
			<div class="stop-list-empty">Find your location to see nearby bus stops.</div>
		</div>
	</div>

	<div id="map"></div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<script type="module" src="./src/js/app.js"></script>
</body>

</html>
