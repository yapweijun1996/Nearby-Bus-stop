<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
	<title>Offline - SG Nearby Bus Stops</title>
	<meta name="theme-color" content="#4f46e5" />
	<link rel="manifest" href="./manifest.webmanifest" />
	<link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
	<style>
		:root {
			--primary: #4f46e5;
			--text: #1e293b;
			--muted: #64748b;
			--surface: #ffffff;
			--border: #dbe3ef;
		}

		* {
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			margin: 0;
			display: grid;
			place-items: center;
			padding: 24px;
			background:
				linear-gradient(135deg, rgba(79, 70, 229, 0.10), rgba(5, 150, 105, 0.12)),
				#f8fafc;
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
		}

		main {
			width: min(100%, 460px);
			padding: 28px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 16px;
			box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin: 0 0 12px;
			font-size: 1.5rem;
			line-height: 1.2;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
			line-height: 1.55;
		}

		a {
			display: inline-flex;
			min-height: 44px;
			align-items: center;
			justify-content: center;
			padding: 0 16px;
			border-radius: 10px;
			background: var(--primary);
			color: #ffffff;
			font-weight: 600;
			text-decoration: none;
		}
	</style>
</head>

<body>
	<main>
		<h1>You are offline</h1>
		<p>SG Nearby Bus Stops is installed, but live maps and bus stop searches need a network connection. Reopen the app when you are back online.</p>
		<a href="./">Try again</a>
	</main>
</body>

</html>
